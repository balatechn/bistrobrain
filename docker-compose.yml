version: '3.9'

x-common-env: &common-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-bistrobrain}:${POSTGRES_PASSWORD:-bistrobrain_secure_pass}@postgres:5432/${POSTGRES_DB:-bistrobrain}
  REDIS_URL: redis://redis:6379

x-service-base: &service-base
  restart: unless-stopped
  networks:
    - bistrobrain-network
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully

services:
  # ============================================================
  # INFRASTRUCTURE
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: bistrobrain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bistrobrain}
      POSTGRES_USER: ${POSTGRES_USER:-bistrobrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bistrobrain_secure_pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data_v4:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bistrobrain} -d ${POSTGRES_DB:-bistrobrain}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - bistrobrain-network

  redis:
    image: redis:7-alpine
    container_name: bistrobrain-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - bistrobrain-network

  minio:
    image: minio/minio:latest
    container_name: bistrobrain-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - bistrobrain-network

  # ============================================================
  # DB MIGRATION (runs once then exits)
  # ============================================================
  migrate:
    build:
      context: .
      dockerfile: packages/database/Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bistrobrain}:${POSTGRES_PASSWORD:-bistrobrain_secure_pass}@postgres:5432/${POSTGRES_DB:-bistrobrain}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bistrobrain-network

  # ============================================================
  # BACKEND SERVICES
  # ============================================================
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: bistrobrain-auth
    <<: *service-base
    environment:
      <<: *common-env
      AUTH_SERVICE_PORT: 4001
      JWT_SECRET: ${JWT_SECRET:-bistrobrain_jwt_secret_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-bistrobrain_refresh_secret_change_in_prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    expose:
      - "4001"

  pos:
    build:
      context: .
      dockerfile: services/pos/Dockerfile
    container_name: bistrobrain-pos
    <<: *service-base
    environment:
      <<: *common-env
      POS_SERVICE_PORT: 4002
      JWT_SECRET: ${JWT_SECRET:-bistrobrain_jwt_secret_change_in_prod}
    expose:
      - "4002"

  inventory:
    build:
      context: .
      dockerfile: services/inventory/Dockerfile
    container_name: bistrobrain-inventory
    <<: *service-base
    environment:
      <<: *common-env
      INVENTORY_SERVICE_PORT: 4003
      JWT_SECRET: ${JWT_SECRET:-bistrobrain_jwt_secret_change_in_prod}
    expose:
      - "4003"

  finance:
    build:
      context: .
      dockerfile: services/finance/Dockerfile
    container_name: bistrobrain-finance
    <<: *service-base
    environment:
      <<: *common-env
      FINANCE_SERVICE_PORT: 4004
      JWT_SECRET: ${JWT_SECRET:-bistrobrain_jwt_secret_change_in_prod}
    expose:
      - "4004"

  crm:
    build:
      context: .
      dockerfile: services/crm/Dockerfile
    container_name: bistrobrain-crm
    <<: *service-base
    environment:
      <<: *common-env
      CRM_SERVICE_PORT: 4005
      JWT_SECRET: ${JWT_SECRET:-bistrobrain_jwt_secret_change_in_prod}
    expose:
      - "4005"

  purchase:
    build:
      context: .
      dockerfile: services/purchase/Dockerfile
    container_name: bistrobrain-purchase
    <<: *service-base
    environment:
      <<: *common-env
      PURCHASE_SERVICE_PORT: 4006
      JWT_SECRET: ${JWT_SECRET:-bistrobrain_jwt_secret_change_in_prod}
    expose:
      - "4006"

  kitchen:
    build:
      context: .
      dockerfile: services/kitchen/Dockerfile
    container_name: bistrobrain-kitchen
    <<: *service-base
    environment:
      <<: *common-env
      KITCHEN_SERVICE_PORT: 4007
      JWT_SECRET: ${JWT_SECRET:-bistrobrain_jwt_secret_change_in_prod}
    expose:
      - "4007"

  hr:
    build:
      context: .
      dockerfile: services/hr/Dockerfile
    container_name: bistrobrain-hr
    <<: *service-base
    environment:
      <<: *common-env
      HR_SERVICE_PORT: 4008
      JWT_SECRET: ${JWT_SECRET:-bistrobrain_jwt_secret_change_in_prod}
    expose:
      - "4008"

  reporting:
    build:
      context: .
      dockerfile: services/reporting/Dockerfile
    container_name: bistrobrain-reporting
    <<: *service-base
    environment:
      <<: *common-env
      REPORTING_SERVICE_PORT: 4009
      JWT_SECRET: ${JWT_SECRET:-bistrobrain_jwt_secret_change_in_prod}
    expose:
      - "4009"

  notifications:
    build:
      context: .
      dockerfile: services/notifications/Dockerfile
    container_name: bistrobrain-notifications
    <<: *service-base
    environment:
      <<: *common-env
      NOTIFICATION_SERVICE_PORT: 4010
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    expose:
      - "4010"

  # ============================================================
  # API GATEWAY (Nginx) — frontend served from Vercel
  # ============================================================
  gateway:
    build:
      context: services/gateway
      dockerfile: Dockerfile
    container_name: bistrobrain-gateway
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - nginx_logs:/var/log/nginx
    depends_on:
      - auth
      - pos
      - inventory
      - finance
      - crm
      - purchase
      - kitchen
      - hr
      - reporting
      - notifications
    networks:
      - bistrobrain-network

volumes:
  postgres_data_v4:
  redis_data:
  minio_data:
  nginx_logs:

networks:
  bistrobrain-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
