version: '3.9'

x-common-env: &common-env
  NODE_ENV: production
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/bistrobrain
  REDIS_URL: redis://redis:6379

x-service-base: &service-base
  restart: unless-stopped
  networks:
    - bistrobrain-network
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ============================================================
  # INFRASTRUCTURE
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: bistrobrain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bistrobrain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bistrobrain"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bistrobrain-network

  redis:
    image: redis:7-alpine
    container_name: bistrobrain-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bistrobrain-network

  minio:
    image: minio/minio:latest
    container_name: bistrobrain-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - bistrobrain-network

  # ============================================================
  # DB MIGRATION (runs once then exits)
  # ============================================================
  migrate:
    build:
      context: ./packages/database
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/bistrobrain
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bistrobrain-network

  # ============================================================
  # BACKEND SERVICES
  # ============================================================
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: bistrobrain-auth
    <<: *service-base
    environment:
      <<: *common-env
      AUTH_SERVICE_PORT: 4001
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    expose:
      - "4001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  pos:
    build:
      context: .
      dockerfile: services/pos/Dockerfile
    container_name: bistrobrain-pos
    <<: *service-base
    environment:
      <<: *common-env
      POS_SERVICE_PORT: 4002
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "4002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  inventory:
    build:
      context: .
      dockerfile: services/inventory/Dockerfile
    container_name: bistrobrain-inventory
    <<: *service-base
    environment:
      <<: *common-env
      INVENTORY_SERVICE_PORT: 4003
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "4003"

  finance:
    build:
      context: .
      dockerfile: services/finance/Dockerfile
    container_name: bistrobrain-finance
    <<: *service-base
    environment:
      <<: *common-env
      FINANCE_SERVICE_PORT: 4004
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "4004"

  crm:
    build:
      context: .
      dockerfile: services/crm/Dockerfile
    container_name: bistrobrain-crm
    <<: *service-base
    environment:
      <<: *common-env
      CRM_SERVICE_PORT: 4005
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "4005"

  purchase:
    build:
      context: .
      dockerfile: services/purchase/Dockerfile
    container_name: bistrobrain-purchase
    <<: *service-base
    environment:
      <<: *common-env
      PURCHASE_SERVICE_PORT: 4006
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "4006"

  kitchen:
    build:
      context: .
      dockerfile: services/kitchen/Dockerfile
    container_name: bistrobrain-kitchen
    <<: *service-base
    environment:
      <<: *common-env
      KITCHEN_SERVICE_PORT: 4007
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "4007"

  hr:
    build:
      context: .
      dockerfile: services/hr/Dockerfile
    container_name: bistrobrain-hr
    <<: *service-base
    environment:
      <<: *common-env
      HR_SERVICE_PORT: 4008
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "4008"

  reporting:
    build:
      context: .
      dockerfile: services/reporting/Dockerfile
    container_name: bistrobrain-reporting
    <<: *service-base
    environment:
      <<: *common-env
      REPORTING_SERVICE_PORT: 4009
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "4009"

  notifications:
    build:
      context: .
      dockerfile: services/notifications/Dockerfile
    container_name: bistrobrain-notifications
    <<: *service-base
    environment:
      <<: *common-env
      NOTIFICATION_SERVICE_PORT: 4010
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    expose:
      - "4010"

  # ============================================================
  # FRONTEND APPS
  # ============================================================
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost}
    container_name: bistrobrain-web
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - bistrobrain-network

  admin:
    build:
      context: apps/admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
    container_name: bistrobrain-admin
    restart: unless-stopped
    expose:
      - "3001"
    networks:
      - bistrobrain-network

  # ============================================================
  # API GATEWAY (Nginx)
  # ============================================================
  gateway:
    image: nginx:1.25-alpine
    container_name: bistrobrain-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./services/gateway/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - auth
      - pos
      - inventory
      - finance
      - crm
      - purchase
      - kitchen
      - hr
      - reporting
      - notifications
      - web
      - admin
    networks:
      - bistrobrain-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_logs:

networks:
  bistrobrain-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
