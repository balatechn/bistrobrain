upstream auth_service     { server auth:4001; }
upstream pos_service      { server pos:4002; }
upstream inventory_service{ server inventory:4003; }
upstream finance_service  { server finance:4004; }
upstream crm_service      { server crm:4005; }
upstream purchase_service { server purchase:4006; }
upstream kitchen_service  { server kitchen:4007; }
upstream hr_service       { server hr:4008; }
upstream reporting_service{ server reporting:4009; }
upstream notification_svc { server notifications:4010; }

limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# CORS: allow Vercel deployments and the production domain
map $http_origin $cors_origin {
    default                          "";
    "~^https://.*\.vercel\.app$"     $http_origin;
    "~^https://.*\.vedhitek\.com$"   $http_origin;
    "~^http://localhost(:[0-9]+)?$"  $http_origin;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50M;

    # CORS preflight
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Tenant-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        return 404;
    }

    # Auth Service
    location /api/v1/auth {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # Macro to add CORS on inline locations (applied via proxy_pass + headers snippet)
    # POS Service
    location /api/v1/orders    { limit_req zone=api burst=50; proxy_pass http://pos_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/menu      { limit_req zone=api burst=50; proxy_pass http://pos_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/tables    { limit_req zone=api burst=50; proxy_pass http://pos_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/payments  { limit_req zone=api burst=50; proxy_pass http://pos_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/kot       { limit_req zone=api burst=50; proxy_pass http://pos_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }

    # Inventory Service
    location /api/v1/inventory { limit_req zone=api burst=30; proxy_pass http://inventory_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/grn       { limit_req zone=api burst=20; proxy_pass http://inventory_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/recipes   { limit_req zone=api burst=20; proxy_pass http://inventory_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }

    # Finance Service
    location /api/v1/accounts  { limit_req zone=api burst=30; proxy_pass http://finance_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/journals  { limit_req zone=api burst=20; proxy_pass http://finance_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/expenses  { limit_req zone=api burst=20; proxy_pass http://finance_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }

    # Purchase Service
    location /api/v1/vendors         { limit_req zone=api burst=20; proxy_pass http://purchase_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/purchase-orders { limit_req zone=api burst=20; proxy_pass http://purchase_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/indents         { limit_req zone=api burst=20; proxy_pass http://purchase_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }

    # CRM Service
    location /api/v1/customers  { limit_req zone=api burst=30; proxy_pass http://crm_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/loyalty    { limit_req zone=api burst=20; proxy_pass http://crm_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/campaigns  { limit_req zone=api burst=20; proxy_pass http://crm_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/coupons    { limit_req zone=api burst=20; proxy_pass http://crm_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/feedback   { limit_req zone=api burst=20; proxy_pass http://crm_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }

    # Kitchen Service
    location /api/v1/kds       { limit_req zone=api burst=50; proxy_pass http://kitchen_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }

    # HR Service
    location /api/v1/employees   { limit_req zone=api burst=20; proxy_pass http://hr_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/attendance  { limit_req zone=api burst=30; proxy_pass http://hr_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/payroll     { limit_req zone=api burst=20; proxy_pass http://hr_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/leaves      { limit_req zone=api burst=20; proxy_pass http://hr_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }

    # Reporting Service
    location /api/v1/reports     { limit_req zone=api burst=20; proxy_pass http://reporting_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }
    location /api/v1/analytics   { limit_req zone=api burst=20; proxy_pass http://reporting_service; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }

    # Notifications
    location /api/v1/notifications { limit_req zone=api burst=20; proxy_pass http://notification_svc; proxy_set_header X-Real-IP $remote_addr; add_header Access-Control-Allow-Origin $cors_origin always; add_header Access-Control-Allow-Credentials "true" always; }

    # WebSocket - POS real-time
    location /socket.io {
        proxy_pass http://pos_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"bistrobrain-gateway"}';
        add_header Content-Type application/json;
    }
}
