upstream auth_service     { server auth:4001; }
upstream pos_service      { server pos:4002; }
upstream inventory_service{ server inventory:4003; }
upstream finance_service  { server finance:4004; }
upstream crm_service      { server crm:4005; }
upstream purchase_service { server purchase:4006; }
upstream kitchen_service  { server kitchen:4007; }
upstream hr_service       { server hr:4008; }
upstream reporting_service{ server reporting:4009; }
upstream notification_svc { server notifications:4010; }
upstream web_app          { server web:3000; }
upstream admin_app        { server admin:3001; }

limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    client_max_body_size 50M;

    # Web App
    location / {
        proxy_pass http://web_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Admin App
    location /admin {
        proxy_pass http://admin_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Auth Service
    location /api/v1/auth {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # POS Service
    location /api/v1/orders    { limit_req zone=api burst=50; proxy_pass http://pos_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/menu      { limit_req zone=api burst=50; proxy_pass http://pos_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/tables    { limit_req zone=api burst=50; proxy_pass http://pos_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/payments  { limit_req zone=api burst=50; proxy_pass http://pos_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/kot       { limit_req zone=api burst=50; proxy_pass http://pos_service; proxy_set_header X-Real-IP $remote_addr; }

    # Inventory Service
    location /api/v1/inventory { limit_req zone=api burst=30; proxy_pass http://inventory_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/grn       { limit_req zone=api burst=20; proxy_pass http://inventory_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/recipes   { limit_req zone=api burst=20; proxy_pass http://inventory_service; proxy_set_header X-Real-IP $remote_addr; }

    # Finance Service
    location /api/v1/accounts  { limit_req zone=api burst=30; proxy_pass http://finance_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/journals  { limit_req zone=api burst=20; proxy_pass http://finance_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/expenses  { limit_req zone=api burst=20; proxy_pass http://finance_service; proxy_set_header X-Real-IP $remote_addr; }

    # Purchase Service
    location /api/v1/vendors       { limit_req zone=api burst=20; proxy_pass http://purchase_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/purchase-orders { limit_req zone=api burst=20; proxy_pass http://purchase_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/indents       { limit_req zone=api burst=20; proxy_pass http://purchase_service; proxy_set_header X-Real-IP $remote_addr; }

    # CRM Service
    location /api/v1/customers  { limit_req zone=api burst=30; proxy_pass http://crm_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/loyalty    { limit_req zone=api burst=20; proxy_pass http://crm_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/campaigns  { limit_req zone=api burst=20; proxy_pass http://crm_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/coupons    { limit_req zone=api burst=20; proxy_pass http://crm_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/feedback   { limit_req zone=api burst=20; proxy_pass http://crm_service; proxy_set_header X-Real-IP $remote_addr; }

    # Kitchen Service
    location /api/v1/kds       { limit_req zone=api burst=50; proxy_pass http://kitchen_service; proxy_set_header X-Real-IP $remote_addr; }

    # HR Service
    location /api/v1/employees   { limit_req zone=api burst=20; proxy_pass http://hr_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/attendance  { limit_req zone=api burst=30; proxy_pass http://hr_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/payroll     { limit_req zone=api burst=20; proxy_pass http://hr_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/leaves      { limit_req zone=api burst=20; proxy_pass http://hr_service; proxy_set_header X-Real-IP $remote_addr; }

    # Reporting Service
    location /api/v1/reports     { limit_req zone=api burst=20; proxy_pass http://reporting_service; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/analytics   { limit_req zone=api burst=20; proxy_pass http://reporting_service; proxy_set_header X-Real-IP $remote_addr; }

    # Notifications
    location /api/v1/notifications { limit_req zone=api burst=20; proxy_pass http://notification_svc; proxy_set_header X-Real-IP $remote_addr; }

    # WebSocket - POS real-time
    location /socket.io {
        proxy_pass http://pos_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"bistrobrain-gateway"}';
        add_header Content-Type application/json;
    }
}
